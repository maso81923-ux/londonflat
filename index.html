<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="canonical" href="https://londonflat.uk/" />
    <title>LondonFlat — Premium London Living</title>
    <meta name="description" content="The premier marketplace for high-performance real estate and flat-sharing in Greater London. Find verified premium flats, rooms, and apartments from trusted letting agencies and private landlords." />
    <meta name="keywords" content="London flats, London rooms, London flat share, premium rentals, letting agencies London, property marketplace UK" />

    <!-- Open Graph -->
    <meta property="og:title" content="LondonFlat — Premium London Living" />
    <meta property="og:description" content="The premier marketplace for high-performance real estate and flat-sharing in Greater London." />
    <meta property="og:url" content="https://londonflat.uk/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LondonFlat" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LondonFlat — Premium London Living" />
    <meta name="twitter:description" content="The premier marketplace for high-performance real estate and flat-sharing in Greater London." />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "LondonFlat",
      "url": "https://londonflat.uk",
      "logo": "https://londonflat.uk/favicon.svg",
      "email": "info@londonflat.uk",
      "telephone": "+447576040868",
      "areaServed": {
        "@type": "City",
        "name": "London",
        "sameAs": "https://en.wikipedia.org/wiki/London"
      },
      "description": "Premium London real estate and flat-sharing marketplace connecting professionals with verified high-end flatshares and letting agencies.",
      "priceRange": "£800 - £5000"
    }
    </script>

    <!-- JSON-LD Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LondonFlat",
      "url": "https://londonflat.uk",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://londonflat.uk/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
